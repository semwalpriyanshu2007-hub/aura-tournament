<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="auraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D50BB" />
      <stop offset="100%" style="stop-color:#6E48AA" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0A0A0A" />
  <circle cx="512" cy="512" r="512" fill="url(#glow)" />
  
  <!-- Futuristic Trophy Symbol -->
  <g transform="translate(512, 512)" filter="url(#neonGlow)">
    <!-- Base -->
    <path d="M-120,200 L120,200 L80,240 L-80,240 Z" fill="#6E48AA" opacity="0.8" />
    
    <!-- Outer Glow Lines -->
    <path d="M-150,-100 L-100,-200 L100,-200 L150,-100 L50,150 L-50,150 Z" 
          fill="none" stroke="#00F2FF" stroke-width="4" opacity="0.4" />
          
    <!-- Main Trophy Geometry -->
    <path d="M-100,-150 L100,-150 L60,100 L-60,100 Z" fill="url(#auraGradient)" />
    
    <!-- Neon Accents -->
    <path d="M-100,-150 L0,-250 L100,-150" 
          fill="none" stroke="#00F2FF" stroke-width="8" stroke-linecap="round" />
    
    <!-- Central Energy Core -->
    <circle cx="0" cy="-25" r="40" fill="#00F2FF">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Border Accent -->
  <rect x="20" y="20" width="984" height="984" rx="100" fill="none" stroke="#6E48AA" stroke-width="1" opacity="0.2" />
</svg>
